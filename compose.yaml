services:
    webserver:
        image: nginx:alpine
        ports:
            - "80:80"

        volumes:
            - ./:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

        depends_on:
            - app

    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www
        depends_on:
            - db

    db:
        image: mysql:8.0
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: laravel_db
            MYSQL_USER: laravel_user
            MYSQL_PASSWORD: pass
            MYSQL_ROOT_PASSWORD: rootpassword
        volumes:
            - db_data:/var/lib/mysql
volumes:
    db_data:
